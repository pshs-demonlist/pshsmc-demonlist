name: Update Level List from Google Sheets

on:
  repository_dispatch:
    types: [level_approved]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Process and Sort Level Entry
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './levels.json';
            
            const newEntry = context.payload.client_payload.data;
            
            let currentList = [];
            if (fs.existsSync(path)) {
              try {
                currentList = JSON.parse(fs.readFileSync(path, 'utf8'));
              } catch (e) {
                currentList = [];
              }
            }
            
            // Look for the level by ID or exact Name
            let existingLevelIndex = currentList.findIndex(item => 
              String(item.id) === String(newEntry.id) || 
              item.name.toLowerCase() === newEntry.name.toLowerCase()
            );
            
            if (existingLevelIndex !== -1) {
              // SCRIPT FOUND AN EXISTING LEVEL - IT'S A NEW RECORD!
              let existingLevel = currentList[existingLevelIndex];
              
              // Ensure we don't accidentally add the same person twice
              let victorExists = existingLevel.victorList.some(v => v.name.toLowerCase() === newEntry.verifier.toLowerCase());
              
              if (!victorExists) {
                // Append the new victor dynamically from the payload
                existingLevel.victorList.push({
                  name: newEntry.verifier,
                  video: newEntry.video,
                  percent: 100
                });
              }
              // Replace the old level data with the newly updated one
              currentList[existingLevelIndex] = existingLevel;
            } else {
              // SCRIPT DID NOT FIND THE LEVEL - IT'S BRAND NEW!
              currentList.push(newEntry);
            }
            
            // Separate lists
            let demons = currentList.filter(item => item.listType !== 'challenge');
            let challenges = currentList.filter(item => item.listType === 'challenge');
            
            // Dynamic rating fetcher for sorting
            async function fetchLiveTier(id) {
              try {
                const res = await fetch(`https://gdladder.com/api/level?levelID=${id}`);
                if (!res.ok) return 3.00;
                const json = await res.json();
                let data = Array.isArray(json) ? json[0] : json;
                let rating = data?.Rating || data?.rating || data?.tier || 3.00;
                return parseFloat(rating);
              } catch (err) {
                return 3.00; 
              }
            }
            
            // Re-compile list difficulties and sort accurately
            async function sortList(list) {
              const mapped = await Promise.all(list.map(async (item) => {
                const tier = await fetchLiveTier(item.id);
                return { item, tier };
              }));
              
              mapped.sort((a, b) => b.tier - a.tier);
              
              return mapped.map((wrapper, index) => {
                wrapper.item.rank = index + 1;
                return wrapper.item;
              });
            }
            
            async function run() {
              const sortedDemons = await sortList(demons);
              const sortedChallenges = await sortList(challenges);
              const combined = [...sortedDemons, ...sortedChallenges];
              
              fs.writeFileSync(path, JSON.stringify(combined, null, 2));
            }
            
            await run();

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "GitHub List Automation"
          git config --global user.email "actions@github.com"
          git add levels.json
          git commit -m "Automated database update: Synced level ID ${{ github.event.client_payload.data.id }}" || exit 0
          git push
