name: Update Level List from Google Sheets

on:
  repository_dispatch:
    types: [level_approved]

permissions:
  contents: write

# 🟢 FIXES THE RUNNER WARNING: Explicitly opts into Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Overwrite with Master Database Array
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './levels.json';
            
            // Extract the fully structured array directly from the client payload
            const updatedLevelsList = context.payload.client_payload.levels;
            
            if (!updatedLevelsList || !Array.isArray(updatedLevelsList)) {
              console.log("Error: Data payload is missing or isn't a structured array.");
              return;
            }
            
            console.log(`Payload valid. Syncing database with ${updatedLevelsList.length} total entries.`);
            
            // Save the complete array back directly to levels.json
            fs.writeFileSync(path, JSON.stringify(updatedLevelsList, null, 2));

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "GitHub List Automation"
          git config --global user.email "actions@github.com"
          git add levels.json
          git commit -m "Level placed!" || exit 0
          git push
