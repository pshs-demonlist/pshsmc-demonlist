name: Update Level List from Google Sheets

on:
  repository_dispatch:
    types: [level_approved]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Process and Sort Level Entry
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './levels.json';
            
            // Extract the payload sent from Google Sheets
            const newEntry = context.payload.client_payload;
            
            // Read current levels list safely
            let currentList = [];
            if (fs.existsSync(path)) {
              try {
                currentList = JSON.parse(fs.readFileSync(path, 'utf8'));
              } catch (e) {
                currentList = [];
              }
            }
            
            // Filter out existing copy of this specific ID to prevent duplicates
            currentList = currentList.filter(item => String(item.id) !== String(newEntry.id));
            
            // Separate lists by type for distinct ranking systems
            let demons = currentList.filter(item => item.listType !== 'challenge');
            let challenges = currentList.filter(item => item.listType === 'challenge');
            
            if (newEntry.listType === 'challenge') {
              challenges.push(newEntry);
              challenges.sort((a, b) => b.preciseTier - a.preciseTier);
              challenges.forEach((item, idx) => item.rank = idx + 1);
            } else {
              demons.push(newEntry);
              demons.sort((a, b) => b.preciseTier - a.preciseTier);
              demons.forEach((item, idx) => item.rank = idx + 1);
            }
            
            // Merge everything back together
            const combined = [...demons, ...challenges];
            
            // Clean up temporary precise metrics before saving
            combined.forEach(item => delete item.preciseTier);
            
            // Write pretty-printed output back to file system
            fs.writeFileSync(path, JSON.stringify(combined, null, 2));

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "GitHub List Automation"
          git config --global user.email "actions@github.com"
          git add levels.json
          git commit -m "Automated database update: Added level ID ${{ github.event.client_payload.id }}" || exit 0
          git push
