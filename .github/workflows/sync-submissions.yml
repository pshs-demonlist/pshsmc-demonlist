name: Update Level List from Google Sheets

on:
  repository_dispatch:
    types: [level_approved]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process and Sort Level Entry
        uses: actions/github-script@v7
        with:
          script: |
            let fs = require('fs');
            let path = './levels.json';
            
            let newEntry = context.payload.client_payload.data;
            
            // 1. Load the existing levels
            let currentList = [];
            if (fs.existsSync(path)) {
              try {
                currentList = JSON.parse(fs.readFileSync(path, 'utf8'));
              } catch (e) {
                currentList = [];
              }
            }
            
            // Ensure the incoming level's rawTier is a readable decimal number
            newEntry.rawTier = parseFloat(newEntry.rawTier) || 0;
            
            // 2. Check if the level already exists in the file
            let existingIndex = currentList.findIndex(item => String(item.id) === String(newEntry.id));
            
            if (existingIndex !== -1) {
              let existingLevel = currentList[existingIndex];
              
              // Add the victor if they aren't already listed
              let victorExists = existingLevel.victorList.some(v => v.name.toLowerCase() === newEntry.verifier.toLowerCase());
              if (!victorExists) {
                existingLevel.victorList.push({
                  name: newEntry.verifier,
                  video: newEntry.video,
                  percent: 100
                });
              }
              
              // Update the rawTier just in case GDDL updated their decimals
              existingLevel.rawTier = newEntry.rawTier;
              currentList[existingIndex] = existingLevel;
            } else {
              // It's a brand new level, just add it to the list
              currentList.push(newEntry);
            }
            
            // 3. Separate them so we don't mix up Demons and Challenges
            let demons = currentList.filter(item => item.listType !== 'challenge');
            let challenges = currentList.filter(item => item.listType === 'challenge');
            
            // 4. AUTOMATIC DECIMAL SORTING (Highest to Lowest)
            // This compares the exact decimal tiers of every single level
            demons.sort((a, b) => parseFloat(b.rawTier || 0) - parseFloat(a.rawTier || 0));
            challenges.sort((a, b) => parseFloat(b.rawTier || 0) - parseFloat(a.rawTier || 0));
            
            // 5. Automatically assign the correct Rank (1, 2, 3...) based on their new sorted positions
            demons.forEach((item, index) => {
              item.rank = index + 1;
            });
            
            challenges.forEach((item, index) => {
              item.rank = index + 1;
            });
            
            // 6. Combine and save (We KEEP rawTier so it works flawlessly next time)
            let combined = demons.concat(challenges);
            fs.writeFileSync(path, JSON.stringify(combined, null, 2));

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "GitHub List Automation"
          git config --global user.email "actions@github.com"
          git add levels.json
          git commit -m "Automated decimal sorting: Synced level ID ${{ github.event.client_payload.data.id }}" || exit 0
          git push
