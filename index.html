<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PSHS-MC Demonlist</title>
<style>
  :root{
    --bg:#0b0d12; --panel:#111522; --line:#1e2438; --text:#e9eefc;
    --muted:#9aa3b2; --accent:#ff4b4b; --good:#36d399; --danger:#662f36;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:16px 18px;font-size:20px;font-weight:700;position:sticky;top:0;z-index:10}
  .wrap{max-width:1100px;margin:20px auto;padding:0 16px 32px}
  .section{background:#0f1320;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
  .section h3{margin:0 0 12px;font-size:16px}
  .topbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .btn{border:none;border-radius:8px;padding:10px 14px;background:#1b2238;color:var(--text);cursor:pointer;font-weight:700}
  .btn:hover{filter:brightness(1.08)}
  .btn-primary{background:#2d3a63}
  .badge{display:inline-block;margin-top:8px;padding:4px 8px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:#dce4f5;background:#0b0f1a}
  .muted{color:var(--muted);font-size:13px}
  #search,.input,.select{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--line);background:#0b0f1a;color:var(--text);outline:none;font-size:14px}
  #search::placeholder,.input::placeholder{color:var(--muted)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .list{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .row{display:flex;gap:14px;padding:14px;border-bottom:1px solid var(--line);background:#0f1320;cursor:pointer;transition:.15s}
  .row:hover{background:#171c2d}
  .rank{width:60px;color:var(--accent);font-weight:700;font-size:18px;flex-shrink:0}
  .thumb{width:160px;height:90px;background:#222;border-radius:6px;overflow:hidden;flex-shrink:0}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .info{flex:1;min-width:0}
  .title{font-size:18px;font-weight:700}
  .sub{font-size:13px;color:var(--muted);margin-top:4px;word-break:break-word}
  .points{font-size:13px;color:#cfd6e6;margin-top:6px}
  .detail,.profile{display:none}
  .back{color:var(--muted);cursor:pointer;margin-bottom:12px;display:inline-block}
  .back:hover{color:var(--text)}
  .video{width:100%;aspect-ratio:16/9;margin-top:12px;background:#0f1320;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  iframe{width:100%;height:100%;border:none}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;font-size:13px;color:var(--muted)}
  .stat{background:#0f1320;border:1px solid var(--line);padding:10px;border-radius:8px}
  .empty{padding:16px;color:var(--muted);border:1px solid var(--line);border-radius:10px;background:#0f1320}
  .tiny{font-size:12px;color:var(--muted);margin-top:8px}
  
  /* Clickable Victor tag elements */
  .victor-link {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
  }
  .victor-link:hover {
    text-decoration: underline;
  }
  .profile-level-item {
    padding: 10px;
    background: #111522;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  @media (max-width:700px){
    .row{flex-direction:column}
    .thumb{width:100%;height:auto;aspect-ratio:16/9}
    .grid,.stats{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header>PSHS-MC Demonlist</header>

<div class="wrap">
  <div id="listPage">
    <div class="section">
      <h3>Search</h3>
      <input id="search" type="text" placeholder="Search demons, creators, or difficulty..." />
    </div>

    <div class="section">
      <h3>Levels</h3>
      <div class="list" id="list"><div class="empty">Loading demons...</div></div>
    </div>

    <div class="section">
      <h3>Submit a record or propose a new level</h3>
      <div class="grid">
        <div>
          <label class="muted">Submission type</label>
          <select id="submissionType" class="select">
            <option value="record">Record submission</option>
            <option value="newLevel">New level proposal</option>
          </select>
        </div>
        <div id="existingLevelWrap">
          <label class="muted">Choose level</label>
          <select id="existingLevel" class="select"></select>
        </div>
      </div>

      <div class="grid" style="margin-top:12px;">
        <div>
          <label class="muted">Username</label>
          <input id="username" class="input" type="text" placeholder="Your username" />
        </div>
        <div>
          <label class="muted">Record link (YouTube)</label>
          <input id="recordLink" class="input" type="text" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
      </div>

      <div id="newLevelFields" style="display:none; margin-top:12px;">
        <h3 style="margin:0 0 12px;">New level details</h3>
        <div class="grid">
          <div><label class="muted">Level name</label><input id="newName" class="input" type="text" placeholder="Level name" /></div>
          <div><label class="muted">Creator</label><input id="newCreator" class="input" type="text" placeholder="Level creator" /></div>
        </div>
        <div class="grid" style="margin-top:12px;">
          <div><label class="muted">Level ID</label><input id="newLevelId" class="input" type="text" placeholder="e.g. 10565740" /></div>
        </div>
      </div>

      <div class="topbar">
        <button class="btn btn-primary" id="submitBtn">Send for review</button>
      </div>
      <div class="tiny">Submissions are automatically routed to your connected spreadsheet validation log pipeline.</div>
    </div>
  </div>

  <div class="detail" id="detailPage">
    <div class="back" id="backBtn">← Back to list</div>
    <h2 id="dTitle"></h2>
    <div id="dInfo" class="sub"></div>
    <div class="video" id="video"></div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="profile" id="profilePage">
    <div class="back" id="profileBackBtn">← Back to level details</div>
    <h2 id="pName" style="margin-bottom: 4px;"></h2>
    <h3 id="pTotalPoints" style="color: var(--good); margin: 0 0 20px 0;"></h3>
    <div class="section">
      <h3>Approved List Completions</h3>
      <div id="pCompletions"></div>
    </div>
  </div>
</div>

// Helper to reliably separate combined user strings inside victorList arrays
function cleanVictorList(list) {
  if (!list) return [];
  let parsed = [];
  list.forEach(entry => {
    if (entry.includes(",")) {
      entry.split(",").forEach(name => parsed.push(name.trim()));
    } else {
      parsed.push(entry.trim());
    }
  });
  return parsed.filter(name => name.length > 0);
}

// DYNAMIC POINT CALCULATION ENGINE
function calculatePoints(rank) {
  const r = Number(rank);
  if (r <= 75) {
    return (350 * Math.exp(-0.0654 * (r - 1))).toFixed(2);
  } else if (r <= 150) {
    const pointsAt75 = 350 * Math.exp(-0.0654 * (75 - 1));
    return (pointsAt75 * (1 - (r - 75) / 76)).toFixed(2);
  }
  return "0.00";
}

function renderList(data) {
  listContainer.innerHTML = "";

  if(data.length === 0) {
    listContainer.innerHTML = '<div class="empty">No matching records discovered</div>';
    return;
  }

  data.forEach(item => {
    const row = document.createElement("div");
    row.className = "row";
    row.onclick = (e) => {
      if (!e.target.classList.contains('victor-link')) {
        showDetail(item);
      }
    };

    const calculatedPoints = calculatePoints(item.rank);
    const cleanedVictors = cleanVictorList(item.victorList);
    
    let victorHTML = "None";
    if (cleanedVictors.length) {
      victorHTML = cleanedVictors.map(name => 
        `<span class="victor-link" onclick="showProfile('${name}')">${name}</span>`
      ).join(", ");
    }

    row.innerHTML = `
      <div class="rank">#${item.rank}</div>
      <div class="thumb">
        <img src="${item.img}" alt="${item.name}" onerror="this.src='https://placehold.co/160x90?text=Processing...'">
      </div>
      <div class="info">
        <div class="title">${item.name}</div>
        <div class="sub">By ${item.creator} • ${item.diff}</div>
        <div class="sub">Victor List: ${victorHTML}</div>
        <div class="points">${calculatedPoints} points</div>
        <div class="badge">ID ${item.id}</div>
      </div>
    `;
    listContainer.appendChild(row);
  });
}

function initSelectOptions() {
  existingLevelSelect.innerHTML = "";
  demonData.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item.name;
    opt.dataset.id = item.id;
    opt.dataset.creator = item.creator;
    opt.textContent = `${item.name} (${item.id})`;
    existingLevelSelect.appendChild(opt);
  });
}

submissionType.onchange = () => {
  if (submissionType.value === "record") {
    existingLevelWrap.style.display = "block";
    newLevelFields.style.display = "none";
  } else {
    existingLevelWrap.style.display = "none";
    newLevelFields.style.display = "block";
  }
};

searchInput.oninput = () => {
  const query = searchInput.value.toLowerCase().trim();
  const filtered = demonData.filter(item => 
    item.name.toLowerCase().includes(query) || 
    item.creator.toLowerCase().includes(query) || 
    item.diff.toLowerCase().includes(query)
  );
  renderList(filtered);
};

let lastViewedItem = null;

function showDetail(item) {
  lastViewedItem = item;
  listPage.style.display = "none";
  profilePage.style.display = "none";
  detailPage.style.display = "block";
  
  const currentPoints = calculatePoints(item.rank);
  const cleanedVictors = cleanVictorList(item.victorList);
  
  let victorHTML = "None registered";
  if (cleanedVictors.length) {
    victorHTML = cleanedVictors.map(name => 
      `<span class="victor-link" onclick="showProfile('${name}')">${name}</span>`
    ).join(", ");
  }
  
  document.getElementById("dTitle").textContent = `${item.name} (By ${item.creator})`;
  document.getElementById("dInfo").textContent = `${item.diff} — ID: ${item.id} — ${currentPoints} Points`;
  
  const videoWrap = document.getElementById("video");
  if(item.video) {
    videoWrap.innerHTML = `<iframe src="${item.video}" allowfullscreen></iframe>`;
  } else {
    videoWrap.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted);">No documentation video embed ready.</div>`;
  }
  
  const statsWrap = document.getElementById("stats");
  statsWrap.innerHTML = `
    <div class="stat"><h4>Placement Rank</h4><p>#${item.rank}</p></div>
    <div class="stat"><h4>Verified Victors</h4><p>${victorHTML}</p></div>
  `;
}

// POINTERCRATE USER SHEET GENERATOR
function showProfile(playerName) {
  listPage.style.display = "none";
  detailPage.style.display = "none";
  profilePage.style.display = "block";

  document.getElementById("pName").textContent = playerName;

  let totalPoints = 0;
  const completionsContainer = document.getElementById("pCompletions");
  completionsContainer.innerHTML = "";

  // Scan your manual database arrays to compute user profile data logs
  demonData.forEach(level => {
    const victors = cleanVictorList(level.victorList);
    if (victors.includes(playerName)) {
      const pts = parseFloat(calculatePoints(level.rank));
      totalPoints += pts;

      const div = document.createElement("div");
      div.className = "profile-level-item";
      div.innerHTML = `
        <div>
          <strong>#${level.rank} - ${level.name}</strong> 
          <span class="muted">by ${level.creator}</span>
        </div>
        <div style="color: var(--accent); font-weight: bold;">+${pts.toFixed(2)} pts</div>
      `;
      completionsContainer.appendChild(div);
    }
  });

  document.getElementById("pTotalPoints").textContent = `Total Score: ${totalPoints.toFixed(2)} Points`;
  
  if(completionsContainer.innerHTML === "") {
    completionsContainer.innerHTML = '<div class="empty">No approved completions listed.</div>';
  }
}

backBtn.onclick = () => {
  detailPage.style.display = "none";
  profilePage.style.display = "none";
  listPage.style.display = "block";
};

profileBackBtn.onclick = () => {
  if (lastViewedItem) {
    showDetail(lastViewedItem);
  } else {
    profilePage.style.display = "none";
    listPage.style.display = "block";
  }
};

submitBtn.onclick = async () => {
  const type = submissionType.value;
  const username = document.getElementById("username").value.trim();
  const recordLink = document.getElementById("recordLink").value.trim();

  if(!username || !recordLink) {
    alert("Please ensure both Username and valid Record Link fields are populated.");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Processing payload...";

  let payload = {};

  if(type === "record") {
    const selectedOpt = existingLevelSelect.options[existingLevelSelect.selectedIndex];
    payload = {
      type: "record",
      levelName: selectedOpt.value,
      id: selectedOpt.dataset.id,
      username: username,
      creator: selectedOpt.dataset.creator,
      recordLink: recordLink
    };
  } else {
    const newName = document.getElementById("newName").value.trim();
    const newCreator = document.getElementById("newCreator").value.trim();
    const newLevelId = document.getElementById("newLevelId").value.trim();

    if(!newName || !newCreator || !newLevelId) {
      alert("Please fully specify all fields for the Level Proposal execution parameters.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Send for review";
      return;
    }

    payload = {
      type: "newLevel",
      newName: newName,
      newLevelId: newLevelId,
      username: username,
      newCreator: newCreator,
      recordLink: recordLink
    };
  }

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    
    if(result.status === "ok") {
      alert(`Success! Data written securely into Sheet tab target: ${result.targetSheet}`);
      document.getElementById("username").value = "";
      document.getElementById("recordLink").value = "";
    } else {
      alert("The spreadsheet engine rejected layout payload format configuration: " + result.message);
    }
  } catch (err) {
    alert("System API communication failure context details: " + err.toString());
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Send for review";
  }
};

window.onload = () => {
  renderList(demonData);
  initSelectOptions();
};
</script>
