<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSHS-MC Demonlist</title>

<style>
:root{
  --bg:#0b0d12; --panel:#111522; --line:#1e2438; --text:#e9eefc;
  --muted:#9aa3b2; --accent:#ff4b4b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:var(--panel);
  padding:16px;
  font-size:20px;
  font-weight:700;
  border-bottom:1px solid var(--line);
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.section{
  background:#0f1320;
  border:1px solid var(--line);
  padding:14px;
  border-radius:10px;
  margin-bottom:16px;
}

#search{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#0b0f1a;
  color:white;
}

.list{
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}

.row{
  display:flex;
  gap:12px;
  padding:12px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}

.row:hover{background:#171c2d}

.rank{width:50px;color:var(--accent);font-weight:700}

.thumb img{
  width:140px;height:80px;object-fit:cover;border-radius:6px;
}

.info{flex:1}

.title{font-weight:700;font-size:18px}

.sub{color:var(--muted);font-size:13px}

</style>
</head>

<body>

<header>PSHS-MC Demonlist</header>

<div class="wrap">

  <div class="section">
    <input id="search" placeholder="Search demons..." />
  </div>

  <div class="section">
    <h3>Levels</h3>
    <div class="list" id="list"></div>
  </div>

</div>

<script src="main.js"></script>

</body>
</html>
